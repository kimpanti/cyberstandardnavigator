<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Navigator | Gap Analysis & CSV</title>
    <style>
        :root {
            --primary: #007AFF;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --accent: #38bdf8;
            --match: #10b981;
            --partial: #f59e0b;
            --gap: #ef4444;
        }

        body { background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        
        .disclaimer { 
            background: rgba(245, 158, 11, 0.05); border: 1px solid var(--partial); 
            padding: 15px; border-radius: 10px; margin-bottom: 25px; font-size: 0.85rem;
        }

        .inventory-hero {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;
        }
        .inv-box { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .inv-val { font-size: 2rem; font-weight: 800; display: block; }

        .selector-bar { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 20px; }
        
        .mapping-card { background: var(--glass); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 25px; overflow: hidden; }
        .family-header { background: rgba(15, 23, 42, 0.8); padding: 15px 25px; border-bottom: 1px solid var(--border); }
        .official-desc { font-size: 0.85rem; color: #94a3b8; font-style: italic; margin-top: 5px; }

        .comparison-grid { display: grid; grid-template-columns: 1fr 150px 1fr; padding: 25px; gap: 30px; }
        .control-panel { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        
        .status-badge { 
            display: block; padding: 5px; border-radius: 5px; font-size: 0.7rem; font-weight: 900; 
            text-transform: uppercase; text-align: center; margin-top: 10px;
        }
        .bg-match { background: var(--match); color: white; }
        .bg-partial { background: var(--partial); color: white; }
        .bg-gap { background: var(--gap); color: white; }

        select, input { background: #1e293b; color: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border); width: 100%; }
        .btn-csv { background: #10b981; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="disclaimer">
        <strong>⚠️ EDUCATIONAL PURPOSE ONLY:</strong> This mapping logic analyzes functional overlap. 
        <strong>Match:</strong> High functional parity. 
        <strong>Partial:</strong> Overlapping intent but different rigor/scope. 
        <strong>Gap:</strong> No equivalent control found in the target framework.
    </div>

    <div class="inventory-hero">
        <div class="inv-box"><span class="inv-val" id="cnt-match" style="color:var(--match)">0</span><span class="inv-label">Total Matches</span></div>
        <div class="inv-box"><span class="inv-val" id="cnt-partial" style="color:var(--partial)">0</span><span class="inv-label">Partial Overlaps</span></div>
        <div class="inv-box"><span class="inv-val" id="cnt-gap" style="color:var(--gap)">0</span><span class="inv-label">Identified Gaps</span></div>
    </div>

    <div class="selector-bar">
        <select id="f1" onchange="updateUI()"></select>
        <select id="f2" onchange="updateUI()"></select>
        <button class="btn-csv" onclick="exportCSV()">Export to CSV</button>
    </div>
    <input type="text" id="search" placeholder="Search domains or Control IDs..." onkeyup="updateUI()" style="margin-bottom:20px;">

    <div id="results"></div>
</div>

<script>
    const frameworks = [
        { id: "ism", name: "ASD ISM (Australia)" },
        { id: "cobit", name: "COBIT 2019" },
        { id: "nist800", name: "NIST 800-53 Rev. 5" },
        { id: "iso", name: "ISO 27001:2022" },
        { id: "e8", name: "Essential 8" }
    ];

    const database = [
        {
            family: "Identity & Access Control",
            desc: "Official: System and services to ensure access is limited to authorized users/processes.",
            mappings: [
                {
                    ism: { id: "ISM-1504", spec: "MFA for online services." },
                    cobit: { id: "DSS05.04", spec: "Manage user identities and access rights." },
                    nist800: { id: "AC-2", spec: "Account lifecycle management." },
                    iso: { id: "A.5.15", spec: "Review of access rights." },
                    e8: { id: "MFA", spec: "MFA for all remote/admin access." },
                    type: "Partial" // Relationship between ISM technical vs COBIT process
                }
            ]
        },
        {
            family: "Cyber Security Program Management",
            desc: "Official: Framework for the planning, implementation, and oversight of security operations.",
            mappings: [
                {
                    ism: { id: "ISM-0033", spec: "Implement a cyber security program." },
                    cobit: { id: "APO13.01", spec: "Establish an ISMS." },
                    nist800: { id: "PM-1", spec: "Information security program plan." },
                    iso: { id: "A.5.1", spec: "Policies for information security." },
                    e8: { id: "None", spec: "Essential 8 is purely mitigation, not governance." },
                    type: "Gap" // Showing E8 has no governance equivalent
                }
            ]
        }
    ];

    function init() {
        const s1 = document.getElementById('f1'), s2 = document.getElementById('f2');
        frameworks.forEach(f => {
            s1.add(new Option(f.name, f.id));
            s2.add(new Option(f.name, f.id));
        });
        s2.selectedIndex = 1;
        updateUI();
    }

    function updateUI() {
        const f1 = document.getElementById('f1').value, f2 = document.getElementById('f2').value;
        const q = document.getElementById('search').value.toLowerCase();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "";
        
        let m=0, p=0, g=0;

        database.forEach(cat => {
            const filtered = cat.mappings.filter(map => (cat.family + map[f1].id).toLowerCase().includes(q));
            if(filtered.length === 0) return;

            const card = document.createElement('div');
            card.className = "mapping-card";
            card.innerHTML = `<div class="family-header"><strong>${cat.family}</strong><div class="official-desc">${cat.desc}</div></div>`;
            
            filtered.forEach(map => {
                let status = "Match";
                if (map[f1].id === "None" || map[f2].id === "None") { status = "Gap"; g++; }
                else if (map.type === "Partial") { status = "Partial"; p++; }
                else { m++; }

                card.innerHTML += `<div class="comparison-grid">
                    <div class="control-panel"><strong>${map[f1].id}</strong><p>${map[f1].spec}</p></div>
                    <div style="text-align:center"><span class="status-badge bg-${status.toLowerCase()}">${status}</span></div>
                    <div class="control-panel"><strong>${map[f2].id}</strong><p>${map[f2].spec}</p></div>
                </div>`;
            });
            resDiv.appendChild(card);
        });
        document.getElementById('cnt-match').innerText = m;
        document.getElementById('cnt-partial').innerText = p;
        document.getElementById('cnt-gap').innerText = g;
    }

    function exportCSV() {
        const f1 = document.getElementById('f1').value, f2 = document.getElementById('f2').value;
        let csv = "Family,Framework A ID,Framework A Spec,Alignment,Framework B ID,Framework B Spec\n";
        database.forEach(cat => {
            cat.mappings.forEach(map => {
                let status = (map[f1].id === "None" || map[f2].id === "None") ? "Gap" : (map.type === "Partial" ? "Partial" : "Match");
                csv += `"${cat.family}","${map[f1].id}","${map[f1].spec}","${status}","${map[f2].id}","${map[f2].spec}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'Cyber_Framework_Alignment.csv'; a.click();
    }
    init();
</script>
</body>
</html>
