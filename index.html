<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Standard Navigator | Smart Search v4.0</title>
    <style>
        :root {
            --primary: #007AFF;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            background-color: var(--dark); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(90deg, #007AFF, #00C6FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        .btn-export {
            background: #1e293b; color: white; border: 1px solid var(--primary);
            padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-export:hover { background: var(--primary); box-shadow: 0 0 20px rgba(0, 122, 255, 0.3); }

        /* Heatmap */
        .heatmap-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }
        .heat-cell {
            padding: 15px; text-align: center; border-radius: 16px;
            background: var(--glass); border: 1px solid var(--border); transition: background 0.5s ease;
        }
        .heat-label { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .heat-value { font-weight: 800; font-size: 1.2rem; margin-top: 5px; }

        /* Search & Controls */
        .controls-wrapper {
            background: var(--glass); padding: 25px; border-radius: 20px;
            border: 1px solid var(--border); margin-bottom: 40px;
        }
        .controls-grid {
            display: grid; grid-template-columns: 1fr auto 1fr;
            gap: 20px; align-items: center; margin-bottom: 20px;
        }
        select, #keywordSearch {
            background: #1e293b; color: white; border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; font-size: 1rem; outline: none; width: 100%; box-sizing: border-box;
        }
        
        .suggestions {
            display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; justify-content: center;
        }
        .suggestion-pill {
            background: rgba(0, 122, 255, 0.1); color: var(--primary);
            border: 1px solid rgba(0, 122, 255, 0.3); padding: 6px 14px;
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }
        .suggestion-pill:hover { background: var(--primary); color: white; }

        .vs-circle { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; margin: 0 auto; }

        /* Results Display */
        #mappingResult { min-height: 200px; }
        .mapping-row {
            display: grid; grid-template-columns: 1fr 80px 1fr;
            gap: 20px; align-items: center; margin-bottom: 15px;
            animation: slideUp 0.3s ease forwards;
        }
        .card { background: #1e293b; padding: 22px; border-radius: 16px; border: 1px solid var(--border); transition: 0.2s; }
        .card .code { color: var(--primary); font-weight: 800; font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .connector { height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); opacity: 0.6; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .status-msg { text-align: center; padding: 40px; color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>Cyber Standard Navigator</h1>
            <p style="color: #94a3b8; margin: 5px 0 0 0;">Dynamic Mapping & Search Suggestion Engine</p>
        </div>
        <button class="btn-export" onclick="exportToCSV()">Export CSV</button>
    </div>

    <div class="heatmap-container">
        <div class="heat-cell" id="h-gov"><span class="heat-label">Governance</span><div class="heat-value">0%</div></div>
        <div class="heat-cell" id="h-id"><span class="heat-label">Asset/ID</span><div class="heat-value">0%</div></div>
        <div class="heat-cell" id="h-prot"><span class="heat-label">Protection</span><div class="heat-value">0%</div></div>
        <div class="heat-cell" id="h-det"><span class="heat-label">Detection</span><div class="heat-value">0%</div></div>
        <div class="heat-cell" id="h-res"><span class="heat-label">Recovery</span><div class="heat-value">0%</div></div>
    </div>

    <div class="controls-wrapper">
        <div class="controls-grid">
            <select id="f1" onchange="updateUI()"><option value="cis">CIS Controls v8</option><option value="cobit">COBIT 2019</option><option value="nist">NIST CSF 2.0</option><option value="iso">ISO 27001:2022</option><option value="e8">Essential 8</option></select>
            <div class="vs-circle">VS</div>
            <select id="f2" onchange="updateUI()"><option value="cobit" selected>COBIT 2019</option><option value="cis">CIS Controls v8</option><option value="nist">NIST CSF 2.0</option><option value="iso">ISO 27001:2022</option><option value="e8">Essential 8</option></select>
        </div>
        <input type="text" id="keywordSearch" placeholder="Filter by intent (e.g. 'Asset', 'Data', 'MFA')..." onkeyup="updateUI()">
        <div class="suggestions">
            <span class="suggestion-pill" onclick="fillSearch('Asset')">Inventory</span>
            <span class="suggestion-pill" onclick="fillSearch('Data')">Data Protection</span>
            <span class="suggestion-pill" onclick="fillSearch('Incident')">Response</span>
            <span class="suggestion-pill" onclick="fillSearch('Access')">Access Control</span>
            <span class="suggestion-pill" onclick="fillSearch('Patch')">Patching</span>
        </div>
    </div>

    <div id="mappingResult"></div>
</div>

<script>
    const profiles = {
        "cis": { gov: 10, id: 35, prot: 45, det: 5, res: 5 },
        "cobit": { gov: 70, id: 10, prot: 5, det: 5, res: 10 },
        "nist": { gov: 20, id: 20, prot: 20, det: 20, res: 20 },
        "iso": { gov: 45, id: 15, prot: 20, det: 10, res: 10 },
        "e8": { gov: 5, id: 5, prot: 80, det: 5, res: 5 }
    };

    const mappings = {
        "cis-cobit": [
            { c1: "CIS 01", l1: "Asset Inventory", c2: "BAI09", l2: "Managed Assets" },
            { c1: "CIS 03", l1: "Data Protection", c2: "APO14", l2: "Managed Data" },
            { c1: "CIS 05", l1: "Account Mgmt", c2: "DSS05", l2: "Managed Security Services" },
            { c1: "CIS 17", l1: "Incident Response", c2: "DSS02", l2: "Incident Requests" }
        ],
        "nist-iso": [
            { c1: "GV.OC", l1: "Org Context", c2: "Clause 4", l2: "Context of Org" },
            { c1: "ID.AM", l1: "Asset Mgmt", c2: "A.5.9", l2: "Information Inventory" },
            { c1: "PR.AC", l1: "Access Control", c2: "A.5.15", l2: "Access Rights" },
            { c1: "RS.MA", l1: "Incident Response", c2: "A.5.24", l2: "Incident Planning" }
        ],
        "cis-e8": [
            { c1: "CIS 02", l1: "Software Inventory", c2: "App Control", l2: "Execution Blocklist" },
            { c1: "CIS 07", l1: "Vulnerability Mgmt", c2: "Patch Apps", l2: "Critical Patching" },
            { c1: "CIS 11", l1: "Data Recovery", c2: "Daily Backups", l2: "Recovery Testing" }
        ]
    };

    function fillSearch(term) {
        document.getElementById('keywordSearch').value = term;
        updateUI();
    }

    function updateUI() {
        const s1 = document.getElementById('f1').value, s2 = document.getElementById('f2').value;
        const query = document.getElementById('keywordSearch').value.toLowerCase();
        const p1 = profiles[s1], p2 = profiles[s2];
        
        ['gov', 'id', 'prot', 'det', 'res'].forEach(k => {
            const val = Math.round((p1[k] + p2[k]) / 2);
            const el = document.getElementById('h-' + k);
            el.querySelector('.heat-value').innerText = val + "%";
            el.style.backgroundColor = `rgba(0, 122, 255, ${val/100 + 0.05})`;
        });

        const resDiv = document.getElementById('mappingResult');
        resDiv.innerHTML = "";

        if (s1 === s2) {
            resDiv.innerHTML = `<div class="status-msg">Select two different frameworks to map.</div>`;
            return;
        }

        const key = mappings[s1+'-'+s2] ? s1+'-'+s2 : (mappings[s2+'-'+s1] ? s2+'-'+s1 : null);
        if(!key) {
            resDiv.innerHTML = `<div class="status-msg">No mapping found for this pair in demo. Try CIS vs COBIT.</div>`;
            return;
        }

        const filtered = mappings[key].filter(m => 
            m.l1.toLowerCase().includes(query) || m.l2.toLowerCase().includes(query) ||
            m.c1.toLowerCase().includes(query) || m.c2.toLowerCase().includes(query)
        );

        if(filtered.length === 0) {
            resDiv.innerHTML = `<div class="status-msg">No results for "${query}". Try one of the suggested tags above.</div>`;
            return;
        }

        filtered.forEach((m, i) => {
            const row = document.createElement('div');
            row.className = 'mapping-row';
            const left = key.startsWith(s1) ? {c:m.c1, l:m.l1} : {c:m.c2, l:m.l2};
            const right = key.startsWith(s1) ? {c:m.c2, l:m.l2} : {c:m.c1, l:m.l1};
            row.innerHTML = `<div class="card"><span class="code">${left.c}</span>${left.l}</div><div class="connector"></div><div class="card"><span class="code">${right.c}</span>${right.l}</div>`;
            resDiv.appendChild(row);
        });
    }

    function exportToCSV() {
        const s1 = document.getElementById('f1').value, s2 = document.getElementById('f2').value;
        const key = mappings[s1+'-'+s2] ? s1+'-'+s2 : (mappings[s2+'-'+s1] ? s2+'-'+s1 : null);
        if(!key) return alert("Mapping not found.");
        let csv = `Source,ID,Label,Target,ID,Label\n`;
        mappings[key].forEach(m => { csv += `${s1},"${m.c1}","${m.l1}",${s2},"${m.c2}","${m.l2}"\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `Mapping_${s1}_to_${s2}.csv`; a.click();
    }

    updateUI();
</script>
</body>
</html>
