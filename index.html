<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Navigator | Full Spectrum v20.0</title>
    <style>
        :root {
            --primary: #007AFF; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1); --text: #f8fafc; --accent: #38bdf8;
            --match: #10b981; --partial: #f59e0b; --gap: #ef4444;
        }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; font-size: 0.95rem; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .edu-disclaimer { 
            background: rgba(239, 68, 68, 0.1); border: 1px solid var(--gap); 
            padding: 15px; border-radius: 10px; margin-bottom: 25px; 
            text-align: center; font-weight: bold; color: #fca5a5;
        }

        .source-link { display: inline-block; margin-top: 8px; font-size: 0.75rem; color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); }
        .mapping-card { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 25px; overflow: hidden; }
        .family-header { background: rgba(15, 23, 42, 0.8); padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .comparison-grid { display: grid; grid-template-columns: 1fr 140px 1fr; gap: 25px; padding: 20px; align-items: start; }
        .pane { background: rgba(0,0,0,0.25); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .status-pill { display: block; padding: 6px; border-radius: 6px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
        .bg-match { background: var(--match); } .bg-partial { background: var(--partial); } .bg-gap { background: var(--gap); }

        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #1e293b; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        
        select, input { background: #1e293b; color: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border); width: 100%; margin-bottom: 15px; }
        .btn-csv { background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="edu-disclaimer">
        ⚠️ FOR EDUCATIONAL PURPOSES ONLY. Not to be used as a primary source for official auditing or certification. 
    </div>

    <div class="stats-bar">
        <div class="stat-box"><span id="stat-total" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">0</span><br><small>TOTAL CONTROLS</small></div>
        <div class="stat-box"><span id="stat-match" style="font-size: 1.5rem; font-weight: 800; color: var(--match);">0</span><br><small>FULL MATCHES</small></div>
        <div class="stat-box"><span id="stat-partial" style="font-size: 1.5rem; font-weight: 800; color: var(--partial);">0</span><br><small>PARTIALS</small></div>
        <div class="stat-box"><span id="stat-gap" style="font-size: 1.5rem; font-weight: 800; color: var(--gap);">0</span><br><small>GAPS</small></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <select id="f1" onchange="render()"></select>
        <select id="f2" onchange="render()"></select>
    </div>
    
    <input type="text" id="search" placeholder="Search by Practice, ID, or Keyword (e.g. 'ITIL', 'ISM-1504', 'Authorised')..." onkeyup="render()">
    <button class="btn-csv" onclick="exportCSV()">Export Comprehensive Alignment Matrix (CSV)</button>

    <div id="display"></div>
</div>

<script>
    const frameworks = {
        ism: { name: "ASD ISM (AU)", url: "https://www.cyber.gov.au/resources/information-security-manual" },
        itil: { name: "ITIL 4 (Service Mgmt)", url: "https://www.axelos.com/certifications/itil-service-management" },
        cobit: { name: "COBIT 2019", url: "https://www.isaca.org/resources/cobit" },
        nistcsf: { name: "NIST CSF 2.0", url: "https://www.nist.gov/cyberframework" },
        nist800: { name: "NIST 800-53 R5", url: "https://csrc.nist.gov/pubs/sp/800/53/r5/final" },
        iso: { name: "ISO 27001:2022", url: "https://www.iso.org/standard/27001" },
        e8: { name: "Essential 8", url: "https://www.cyber.gov.au/resources/essential-eight-maturity-model" }
    };

    const database = [
        {
            family: "Access & Identity Management",
            desc: "Managing authorised access to services and information assets.",
            mappings: [
                {
                    ism: { id: "ISM-1504", spec: "MFA is used for all online services.", src: frameworks.ism.url },
                    itil: { id: "Practice 2.1", spec: "Information Security Management: Ensuring confidentiality and availability of access.", src: frameworks.itil.url },
                    cobit: { id: "DSS05.04", spec: "Manage user identities and access rights.", src: frameworks.cobit.url },
                    nistcsf: { id: "PR.AA-01", spec: "Identities for authorised users are managed.", src: frameworks.nistcsf.url },
                    nist800: { id: "AC-2", spec: "Account management and lifecycle.", src: frameworks.nist800.url },
                    iso: { id: "A.5.15", spec: "Provisioning and review of user access rights.", src: frameworks.iso.url },
                    e8: { id: "MFA", spec: "Enforce MFA for remote/admin access.", src: frameworks.e8.url },
                    type: "Match"
                }
            ]
        },
        {
            family: "Incident & Event Management",
            desc: "Restoring normal service operation as quickly as possible.",
            mappings: [
                {
                    ism: { id: "ISM-0139", spec: "Incident reporting and response procedures.", src: frameworks.ism.url },
                    itil: { id: "Practice 4.2", spec: "Incident Management: Minimise negative impact by restoring service.", src: frameworks.itil.url },
                    cobit: { id: "DSS02.04", spec: "Investigate, diagnose and resolve incidents.", src: frameworks.cobit.url },
                    nistcsf: { id: "RS.MA-01", spec: "Incident response plan execution.", src: frameworks.nistcsf.url },
                    nist800: { id: "IR-4", spec: "Incident handling and analysis.", src: frameworks.nist800.url },
                    iso: { id: "A.5.24", spec: "Information security incident management.", src: frameworks.iso.url },
                    e8: { id: "None", spec: "Gap: E8 focuses on mitigation, not response lifecycle.", src: "N/A" },
                    type: "Partial"
                }
            ]
        },
        {
            family: "Change & Configuration Management",
            desc: "Ensuring changes are recorded, evaluated, and authorised.",
            mappings: [
                {
                    ism: { id: "ISM-1153", spec: "A change management process is used for system changes.", src: frameworks.ism.url },
                    itil: { id: "Practice 3.2", spec: "Change Enablement: Maximise successful service and product changes.", src: frameworks.itil.url },
                    cobit: { id: "BAI06.01", spec: "Evaluate, prioritise and authorise change requests.", src: frameworks.cobit.url },
                    nistcsf: { id: "PR.PS-04", spec: "Configuration management and change control.", src: frameworks.nistcsf.url },
                    nist800: { id: "CM-3", spec: "Configuration change control.", src: frameworks.nist800.url },
                    iso: { id: "A.8.32", spec: "Change management of information systems.", src: frameworks.iso.url },
                    e8: { id: "None", spec: "Gap: E8 is a technical baseline, not a change framework.", src: "N/A" },
                    type: "Match"
                }
            ]
        }
    ];

    function init() {
        const s1 = document.getElementById('f1'), s2 = document.getElementById('f2');
        Object.entries(frameworks).forEach(([id, obj]) => {
            s1.add(new Option(obj.name, id));
            s2.add(new Option(obj.name, id));
        });
        s1.value = "itil"; s2.value = "ism";
        render();
    }

    function render() {
        const f1 = document.getElementById('f1').value, f2 = document.getElementById('f2').value;
        const q = document.getElementById('search').value.toLowerCase();
        const display = document.getElementById('display');
        display.innerHTML = "";
        let counts = { total: 0, match: 0, partial: 0, gap: 0 };

        database.forEach(cat => {
            const items = cat.mappings.filter(m => (cat.family + m[f1].id + m[f2].id).toLowerCase().includes(q));
            if (items.length === 0) return;

            const card = document.createElement('div');
            card.className = "mapping-card";
            card.innerHTML = `<div class="family-header"><strong>${cat.family}</strong><div style="font-size:0.8rem; color:#94a3b8;">${cat.desc}</div></div>`;
            
            items.forEach(m => {
                counts.total++;
                const d1 = m[f1], d2 = m[f2];
                let status = (d1.id === "None" || d2.id === "None") ? "Gap" : (m.type === "Partial" ? "Partial" : "Match");
                counts[status.toLowerCase()]++;

                card.innerHTML += `
                    <div class="comparison-grid">
                        <div class="pane">
                            <strong style="color:var(--accent)">${d1.id}</strong>
                            <p style="font-size:0.8rem; margin: 8px 0;">${d1.spec}</p>
                            ${d1.src !== "N/A" ? `<a href="${d1.src}" target="_blank" class="source-link">Official Source ↗</a>` : ''}
                        </div>
                        <div style="text-align:center;"><span class="status-pill bg-${status.toLowerCase()}">${status}</span></div>
                        <div class="pane">
                            <strong style="color:var(--accent)">${d2.id}</strong>
                            <p style="font-size:0.8rem; margin: 8px 0;">${d2.spec}</p>
                            ${d2.src !== "N/A" ? `<a href="${d2.src}" target="_blank" class="source-link">Official Source ↗</a>` : ''}
                        </div>
                    </div>`;
            });
            display.appendChild(card);
        });
        document.getElementById('stat-total').innerText = counts.total;
        document.getElementById('stat-match').innerText = counts.match;
        document.getElementById('stat-partial').innerText = counts.partial;
        document.getElementById('stat-gap').innerText = counts.gap;
    }

    function exportCSV() {
        const f1 = document.getElementById('f1').value, f2 = document.getElementById('f2').value;
        let csv = "Domain,ID_A,Spec_A,Source_A,Alignment,ID_B,Spec_B,Source_B\n";
        database.forEach(cat => {
            cat.mappings.forEach(m => {
                const d1 = m[f1], d2 = m[f2];
                let stat = (d1.id === "None" || d2.id === "None") ? "Gap" : (m.type === "Partial" ? "Partial" : "Match");
                csv += `"${cat.family}","${d1.id}","${d1.spec}","${d1.src}","${stat}","${d2.id}","${d2.spec}","${d2.src}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Global_Alignment_Matrix_${f1}_vs_${f2}.csv`;
        a.click();
    }

    init();
</script>
</body>
</html>
