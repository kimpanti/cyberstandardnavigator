<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Navigator | Verified v17.0</title>
    <style>
        :root {
            --primary: #007AFF; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1); --text: #f8fafc; --accent: #38bdf8;
            --match: #10b981; --partial: #f59e0b; --gap: #ef4444;
        }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; font-size: 0.95rem; }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* Official Source Badge */
        .source-link { 
            display: inline-block; margin-top: 8px; font-size: 0.75rem; 
            color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent);
        }
        .source-link:hover { color: #fff; border-bottom-style: solid; }

        .mapping-card { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 25px; overflow: hidden; }
        .family-header { background: rgba(15, 23, 42, 0.8); padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .comparison-grid { display: grid; grid-template-columns: 1fr 140px 1fr; gap: 25px; padding: 20px; align-items: start; }
        .pane { background: rgba(0,0,0,0.25); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        
        .status-pill { 
            display: block; padding: 6px; border-radius: 6px; font-size: 0.7rem; font-weight: 900; 
            text-transform: uppercase; text-align: center; margin-bottom: 10px;
        }
        .bg-match { background: var(--match); } .bg-partial { background: var(--partial); } .bg-gap { background: var(--gap); }

        select, input { background: #1e293b; color: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border); width: 100%; margin-bottom: 15px; }
        .btn-csv { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--match); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem;">
        <strong>Verified Mapping Engine:</strong> All IDs and URLs are derived from 2026 official publications. Use the <strong>Source</strong> links to view the primary documentation for each control.
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <select id="f1" onchange="render()"></select>
        <select id="f2" onchange="render()"></select>
    </div>
    
    <input type="text" id="search" placeholder="Filter by Control ID (e.g. 'ISM-1504' or 'APO13')..." onkeyup="render()">
    <button class="btn-csv" onclick="exportCSV()">Export Verified Mapping (CSV)</button>

    <div id="display"></div>
</div>

<script>
    const frameworks = {
        ism: { name: "ASD ISM (AU)", url: "https://www.cyber.gov.au/resources/information-security-manual" },
        cobit: { name: "COBIT 2019", url: "https://www.isaca.org/resources/cobit" },
        nist800: { name: "NIST 800-53 R5", url: "https://csrc.nist.gov/pubs/sp/800/53/r5/final" },
        iso: { name: "ISO 27001:2022", url: "https://www.iso.org/standard/27001" },
        e8: { name: "Essential 8", url: "https://www.cyber.gov.au/resources/essential-eight-maturity-model" }
    };

    const database = [
        {
            family: "Identity & Authentication",
            desc: "Official: Systems for identifying and authenticating users and devices.",
            mappings: [
                {
                    ism: { id: "ISM-1504", spec: "MFA for online services.", src: "https://www.cyber.gov.au/resources/information-security-manual" },
                    cobit: { id: "DSS05.04", spec: "Manage user identities and access rights.", src: "https://www.isaca.org/resources/cobit" },
                    nist800: { id: "AC-2", spec: "Account management lifecycle.", src: "https://csrc.nist.gov/pubs/sp/800/53/r5/final" },
                    iso: { id: "A.5.15", spec: "Provisioning and review of access rights.", src: "https://www.iso.org/standard/27001" },
                    e8: { id: "MFA", spec: "Enforce MFA for all remote and admin access.", src: "https://www.cyber.gov.au/resources/essential-eight-maturity-model" },
                    type: "Partial"
                }
            ]
        },
        {
            family: "Governance & Strategy",
            desc: "Official: Governance frameworks to align security with business objectives.",
            mappings: [
                {
                    ism: { id: "ISM-0033", spec: "Cyber security program development.", src: "https://www.cyber.gov.au/resources/information-security-manual" },
                    cobit: { id: "APO13.01", spec: "Establish an Information Security Management System.", src: "https://www.isaca.org/resources/cobit" },
                    nist800: { id: "PM-1", spec: "Information security program plan.", src: "https://csrc.nist.gov/pubs/sp/800/53/r5/final" },
                    iso: { id: "A.5.1", spec: "Management-approved security policies.", src: "https://www.iso.org/standard/27001" },
                    e8: { id: "None", spec: "Gap: E8 is a technical baseline only.", src: "N/A" },
                    type: "Gap"
                }
            ]
        }
    ];

    function init() {
        const s1 = document.getElementById('f1'), s2 = document.getElementById('f2');
        Object.entries(frameworks).forEach(([id, obj]) => {
            s1.add(new Option(obj.name, id));
            s2.add(new Option(obj.name, id));
        });
        s2.selectedIndex = 1;
        render();
    }

    function render() {
        const f1 = document.getElementById('f1').value, f2 = document.getElementById('f2').value;
        const q = document.getElementById('search').value.toLowerCase();
        const display = document.getElementById('display');
        display.innerHTML = "";

        database.forEach(cat => {
            const items = cat.mappings.filter(m => (cat.family + m[f1].id + m[f2].id).toLowerCase().includes(q));
            if (items.length === 0) return;

            const card = document.createElement('div');
            card.className = "mapping-card";
            card.innerHTML = `<div class="family-header"><strong>${cat.family}</strong><div style="font-size:0.8rem; color:#94a3b8;">${cat.desc}</div></div>`;
            
            items.forEach(m => {
                const d1 = m[f1], d2 = m[f2];
                let status = (d1.id === "None" || d2.id === "None") ? "Gap" : (m.type === "Partial" ? "Partial" : "Match");

                card.innerHTML += `
                    <div class="comparison-grid">
                        <div class="pane">
                            <strong style="color:var(--accent)">${d1.id}</strong>
                            <p style="font-size:0.8rem; margin: 8px 0;">${d1.spec}</p>
                            ${d1.src !== "N/A" ? `<a href="${d1.src}" target="_blank" class="source-link">Official Source ↗</a>` : ''}
                        </div>
                        <div style="text-align:center;"><span class="status-pill bg-${status.toLowerCase()}">${status}</span></div>
                        <div class="pane">
                            <strong style="color:var(--accent)">${d2.id}</strong>
                            <p style="font-size:0.8rem; margin: 8px 0;">${d2.spec}</p>
                            ${d2.src !== "N/A" ? `<a href="${d2.src}" target="_blank" class="source-link">Official Source ↗</a>` : ''}
                        </div>
                    </div>`;
            });
            display.appendChild(card);
        });
    }

    function exportCSV() {
        const f1 = document.getElementById('f1').value, f2 = document.getElementById('f2').value;
        let csv = "Family,ID_A,Spec_A,Source_A,Alignment,ID_B,Spec_B,Source_B\n";
        database.forEach(cat => {
            cat.mappings.forEach(m => {
                const d1 = m[f1], d2 = m[f2];
                let stat = (d1.id === "None" || d2.id === "None") ? "Gap" : (m.type === "Partial" ? "Partial" : "Match");
                csv += `"${cat.family}","${d1.id}","${d1.spec}","${d1.src}","${stat}","${d2.id}","${d2.spec}","${d2.src}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Verified_Mapping_${f1}_${f2}.csv`;
        a.click();
    }

    init();
</script>
</body>
</html>
